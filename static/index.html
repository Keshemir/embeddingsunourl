<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>ozenref</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0d0d10;
    --card: #18181d;
    --card-hover: #1f1f26;
    --border: #2a2a33;
    --text: #e8e8ec;
    --muted: #8b8b94;
    --accent: #7c5cff;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 14px; line-height: 1.4;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(13, 13, 16, 0.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .logo { font-weight: 700; font-size: 18px; letter-spacing: -0.02em; }
  .stats { color: var(--muted); font-size: 12px; }
  input[type="text"] {
    background: #0a0a0d; color: var(--text); border: 1px solid var(--border);
    padding: 8px 12px; border-radius: 8px; outline: none; min-width: 240px;
    font-size: 14px;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: background .1s, border-color .1s;
  }
  button:hover { background: var(--card-hover); border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: white; }
  button.tab {
    background: transparent; border: none; padding: 8px 14px;
    border-bottom: 2px solid transparent; border-radius: 0;
    color: var(--muted); font-weight: 500;
  }
  button.tab.active { color: var(--text); border-color: var(--accent); }
  main { padding: 16px; max-width: 1100px; margin: 0 auto; }
  #status { color: var(--muted); margin: 8px 0 16px; font-size: 13px; min-height: 1em; }
  .grid {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color .1s;
  }
  .card:hover { border-color: var(--accent); }
  .card.seed { border-color: var(--accent); background: #1a1a26; }
  .title { font-weight: 600; font-size: 14px; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 11px; color: var(--muted); background: #0a0a0d;
    border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px;
  }
  .meta { color: var(--muted); font-size: 12px; }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; }
  .actions button { font-size: 12px; padding: 4px 8px; }
  .sim { color: var(--accent); font-weight: 600; font-size: 12px; }
  .liked   { background: rgba(74, 222, 128, 0.15); border-color: var(--green); }
  .disliked{ background: rgba(248, 113, 113, 0.15); border-color: var(--red); }
  .saved   { background: rgba(251, 191, 36, 0.15); }
  .empty   { color: var(--muted); text-align: center; padding: 60px 20px; }

  details { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; }
  details summary { cursor: pointer; color: var(--muted); font-size: 12px; }
  pre { font-size: 11px; overflow-x: auto; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="row">
    <div class="logo">ozenref</div>
    <div class="stats" id="stats"></div>
    <div style="flex:1"></div>
    <input id="q" type="text" placeholder='поиск: "chill ambient", "dark drill"...'>
    <button class="primary" id="search-btn">Найти</button>
  </div>
  <div class="row" style="margin-top: 10px;">
    <button class="tab active" data-tab="feed">Лента</button>
    <button class="tab" data-tab="all">Все треки</button>
    <button class="tab" data-tab="similar">Похожие на seed</button>
    <button class="tab" data-tab="search">Поиск</button>
    <div style="flex:1"></div>
    <button id="ingest-btn" title="добавить Suno-ссылку в индекс">+ Добавить трек</button>
    <button id="profile-btn" title="мой taste vector">Профиль</button>
    <button id="reload-btn" title="перезагрузить ленту">↻ обновить</button>
  </div>
  <div id="ingest-panel" class="row" style="margin-top: 10px; display: none;">
    <input id="ingest-url" type="text" placeholder="https://suno.com/song/<id> или /s/<short>"
           style="flex: 1; min-width: 400px;">
    <button class="primary" id="ingest-go">Добавить</button>
    <button id="ingest-cancel">Отмена</button>
  </div>
</header>

<main>
  <details id="profile-block" style="display: none;">
    <summary>Профиль (taste vector)</summary>
    <pre id="profile-json"></pre>
  </details>
  <div id="status"></div>
  <div id="grid" class="grid"></div>
</main>

<script src="/static/app.js"></script>
</body>
</html>
